#!/usr/bin/env bash
# Global orchestrator settings
# All values can be overridden per-agent in agents/<id>/config.conf

# --- Paths ---
ORCH_HOME="${ORCH_HOME:-$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)}"
AGENTS_DIR="$ORCH_HOME/agents"
CHECKPOINTS_DIR="$ORCH_HOME/checkpoints"
LOGS_DIR="$ORCH_HOME/logs"
RUN_DIR="$ORCH_HOME/run"

# --- Default agent settings (overridden per agent) ---
AGENT_CMD="claude"
AGENT_ARGS="--dangerously-skip-permissions"
RESUME_STRATEGY="fresh"        # fresh | continue | resume
IDLE_INTERVAL=120              # seconds between iterations
CHECKPOINT_INTERVAL=60         # seconds between heartbeat writes
WORKDIR="$HOME"
ENABLED="false"                # agents opt-in

# --- Quota / error backoff ---
QUOTA_INITIAL_BACKOFF=300      # 5 min on first quota hit
QUOTA_MAX_BACKOFF=3600         # cap at 1 hour
ERROR_MAX_BACKOFF=900          # cap error backoff at 15 min

# --- Health ---
HEALTH_MAX_SILENT=900          # restart agent if no heartbeat for 15 min

# --- Log rotation ---
LOG_MAX_KB=51200               # 50 MB before rotation

# --- tmux session prefix ---
TMUX_PREFIX="ai-"

# --- Dashboard refresh ---
DASHBOARD_INTERVAL=3           # seconds
