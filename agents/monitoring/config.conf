#!/usr/bin/env bash
# Monitoring agent — system health checks, alerts to log

DESCRIPTION="System health: disk, memory, processes, agent heartbeats"
ENABLED="true"

AGENT_CMD="claude"
AGENT_ARGS="--dangerously-skip-permissions"
RESUME_STRATEGY="fresh"

WORKDIR="$HOME/ai-workspace/monitoring"
IDLE_INTERVAL=300              # health check every 5 minutes
CHECKPOINT_INTERVAL=60
QUOTA_INITIAL_BACKOFF=300
QUOTA_MAX_BACKOFF=3600
