#!/usr/bin/env bash
# Docs agent — keeps documentation in sync with code changes

DESCRIPTION="Sync docs with code: detects drift, updates README/API docs"
ENABLED="false"

AGENT_CMD="claude"
AGENT_ARGS="--dangerously-skip-permissions"
RESUME_STRATEGY="fresh"

WORKDIR="$HOME/ai-workspace/docs"
IDLE_INTERVAL=1800             # check docs every 30 minutes
CHECKPOINT_INTERVAL=60
QUOTA_INITIAL_BACKOFF=300
QUOTA_MAX_BACKOFF=3600
