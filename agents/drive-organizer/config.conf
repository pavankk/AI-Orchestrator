#!/usr/bin/env bash
# Drive organizer agent — watches Google Drive and organises files

DESCRIPTION="Watch Google Drive, organise files into folders, log changes"
ENABLED="false"

AGENT_CMD="claude"
AGENT_ARGS="--dangerously-skip-permissions"
RESUME_STRATEGY="fresh"

WORKDIR="$HOME/ai-workspace/drive-organizer"
IDLE_INTERVAL=1800         # check Drive every 30 minutes
CHECKPOINT_INTERVAL=60
QUOTA_INITIAL_BACKOFF=300
QUOTA_MAX_BACKOFF=3600
