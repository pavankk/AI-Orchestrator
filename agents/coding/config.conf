#!/usr/bin/env bash
# Coding agent — works through a task queue of coding tasks

DESCRIPTION="Autonomous coding: picks up tasks from queue, implements, tests"
ENABLED="false"

AGENT_CMD="claude"
AGENT_ARGS="--dangerously-skip-permissions"
RESUME_STRATEGY="continue"     # maintain context across iterations

WORKDIR="$HOME/ai-workspace/coding"
IDLE_INTERVAL=60               # poll for new tasks every 60s
CHECKPOINT_INTERVAL=60
QUOTA_INITIAL_BACKOFF=300
QUOTA_MAX_BACKOFF=3600
