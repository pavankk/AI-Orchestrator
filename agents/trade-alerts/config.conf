#!/usr/bin/env bash
# Trade alerts agent — fetches daily trade alert emails from Gmail

DESCRIPTION="Fetch trade alert emails from Gmail, log tickers and signals"
ENABLED="false"

AGENT_CMD="claude"
AGENT_ARGS="--dangerously-skip-permissions"
RESUME_STRATEGY="fresh"

WORKDIR="$HOME/ai-workspace/trade-alerts"
IDLE_INTERVAL=3600         # check for new alerts every hour
CHECKPOINT_INTERVAL=60
QUOTA_INITIAL_BACKOFF=300
QUOTA_MAX_BACKOFF=3600
