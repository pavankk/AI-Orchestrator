#!/usr/bin/env bash
# Inbox agent — email triage, drafting, and action extraction

DESCRIPTION="Email triage, draft replies, extract action items"
ENABLED="true"

# Command to run (model-agnostic: swap claude for any CLI agent)
AGENT_CMD="claude"
AGENT_ARGS="--dangerously-skip-permissions"

# fresh: full prompt + context each run
# continue: uses --continue (maintains conversation history in Claude Code)
RESUME_STRATEGY="fresh"

WORKDIR="$HOME/ai-workspace/inbox"
IDLE_INTERVAL=300          # check email every 5 minutes
CHECKPOINT_INTERVAL=60
QUOTA_INITIAL_BACKOFF=300
QUOTA_MAX_BACKOFF=3600
