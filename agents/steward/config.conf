#!/usr/bin/env bash
# steward — weekly platform governance agent
# Triggered by launchd (Saturday 8am), not the continuous daemon

DESCRIPTION="Weekly platform steward: portability check, tech debt report, log rotation, git prune"
ENABLED="false"   # managed via launchd com.aiorch.steward, not daemon loop

AGENT_CMD="claude"
AGENT_ARGS="--dangerously-skip-permissions"
RESUME_STRATEGY="fresh"

WORKDIR="$HOME/ai-workspace/steward"
IDLE_INTERVAL=604800       # 7 days — safety net only, launchd is primary trigger
CHECKPOINT_INTERVAL=60
QUOTA_INITIAL_BACKOFF=300
QUOTA_MAX_BACKOFF=3600
