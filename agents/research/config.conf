#!/usr/bin/env bash
# Research agent — follows a research agenda, saves findings

DESCRIPTION="Autonomous research: investigates topics, saves structured findings"
ENABLED="false"

AGENT_CMD="claude"
AGENT_ARGS="--dangerously-skip-permissions"
RESUME_STRATEGY="fresh"

WORKDIR="$HOME/ai-workspace/research"
